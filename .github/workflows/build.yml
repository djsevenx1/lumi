name: Build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-lynx-bundle:
    name: Build Lynx Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: |
          corepack prepare pnpm@10.28.1 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent 2>/dev/null || echo ~/.local/share/pnpm/store)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build Lynx bundle
        run: pnpm run build

      - name: Verify bundle
        run: |
          ls -la dist/main.lynx.bundle || (echo "bundle not found"; exit 1)

      - name: Upload Lynx bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lynx-bundle-${{ matrix.os }}
          path: dist/main.lynx.bundle
          retention-days: 7

  build-android-apk:
    name: Build Android APK (${{ matrix.os }})
    needs: build-lynx-bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable
      - name: Setup pnpm
        run: corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        env:
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'
        run: pnpm install --frozen-lockfile

      - name: Build Lynx bundle
        run: pnpm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle (auto-generate wrapper)
        uses: gradle/actions/setup-gradle@v4

      - name: Copy Lynx bundle to assets
        working-directory: android
        run: gradle copyLynxBundle --no-daemon

      - name: Assemble debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        working-directory: android
        run: |
          find app/build/outputs/apk -name "*.apk" -type f

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ matrix.os }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 14