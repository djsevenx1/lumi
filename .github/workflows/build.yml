name: Build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        run: |
          # 固定 pnpm 10.x:pnpm 11.x 默认启用 minimumReleaseAge=24h 的 supply-chain 检查,
          # 会在 install 前拒绝最近发布的包。本项目依赖里有 24h 内的新版本(@sigx/lynx-* 等)。
          corepack prepare pnpm@10.28.1 --activate
          pnpm --version

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "STORE_PATH=$(pnpm store path --silent 2>/dev/null || echo ~/.local/share/pnpm/store)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        env:
          # pnpm 10 默认 minimumReleaseAge=24h,会拒绝新发布的包
          # 项目依赖里有 24h 内新发布的版本,关闭该策略以允许安装
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: '0'
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Inspect Rspeedy config
        run: pnpm exec rspeedy inspect

      - name: Build
        run: pnpm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/**
            !dist/**/*.map
          if-no-files-found: warn
          retention-days: 14
